[phases.setup]
nixPkgs = ["php84", "php84Extensions.intl", "php84Extensions.zip", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.curl", "php84Packages.composer"]

[phases.build]
cmds = ["composer install --optimize-autoloader --no-interaction"]

[start]
cmd = "php artisan storage:link --force && mkdir -p storage/app/livewire-tmp && php artisan migrate --force && php -d upload_max_filesize=64M -d post_max_size=64M -d memory_limit=256M -d max_execution_time=120 artisan serve --host=0.0.0.0 --port=$PORT"
